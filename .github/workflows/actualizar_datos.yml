name: Actualizar Datos ONPE (Manual)

on:
  workflow_dispatch: # 👈 Esto es lo que habilita el botón "Run workflow" para ejecución manual

permissions:
  contents: write # 👈 Permiso crucial para que el bot pueda subir el nuevo JSON al repo

jobs:
  extraer-y-guardar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🚀 Ejecutar el Scraper
        run: python scraper.py

      - name: 💾 Hacer Commit y Push de los nuevos datos
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/resultados_presidenciales.json
          
          # Solo hace commit si el archivo JSON realmente tuvo cambios
          git commit -m "Actualización manual de resultados presidenciales" || echo "No hubo cambios en los votos"
          
          git push
